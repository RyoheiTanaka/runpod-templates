name: Build RunPod images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template:
          - name: wan22
            image: runpod-templates-wan22
          - name: acestep15xl
            image: runpod-templates-acestep15xl
        cuda:
          - tag: cuda12.4
            base: runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04
          - tag: cuda12.8
            base: runpod/pytorch:2.8.0-py3.11-cuda12.8.1-cudnn-devel-ubuntu22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ryoheitanaka/${{ matrix.template.image }}
          tags: |
            type=raw,value=latest-${{ matrix.cuda.tag }},enable={{is_default_branch}}
            type=ref,event=tag,suffix=-${{ matrix.cuda.tag }}
            type=sha,suffix=-${{ matrix.cuda.tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: templates/${{ matrix.template.name }}/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=${{ matrix.cuda.base }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
